<!DOCTYPE html>
<html>
<head>
    <title>Bouncing Ball</title>
    <style>
        #box {
            width: 300px;
            height: 300px;
            border: 2px solid black;
            position: relative;
            overflow: hidden;
        }

        #ball {
            width: 30px;
            height: 30px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            left: 0;
            top: 0;
        }
    </style>
</head>
<body>

<div id="box">
    <div id="ball"></div>
</div>

<script>
    var ball = document.getElementById("ball");
    var box = document.getElementById("box");

    var x = 0;
    var y = 0;

    var dx = 2; // speed in x direction
    var dy = 2; // speed in y direction

    var boxSize = 300;
    var ballSize = 30;

    function animate() {
        x += dx;
        y += dy;

        // Bounce on walls
        if (x + ballSize > boxSize || x < 0) {
            dx = -dx;
        }

        if (y + ballSize > boxSize || y < 0) {
            dy = -dy;
        }

        ball.style.left = x + "px";
        ball.style.top = y + "px";

        requestAnimationFrame(animate);
    }

    animate();
</script>

<script>
(function () {
    var box = document.getElementById("box");

    var width = 300;
    var height = 300;

    var drops = [];
    var dropCount = 100;

    // Create raindrops
    for (var i = 0; i < dropCount; i++) {
        var drop = document.createElement("div");
        drop.style.position = "absolute";
        drop.style.width = "2px";
        drop.style.height = "10px";
        drop.style.background = "blue";
        drop.style.opacity = 0.6;

        box.appendChild(drop);

        drops.push({
            el: drop,
            x: Math.random() * width,
            y: Math.random() * height,
            speed: 2 + Math.random() * 3
        });
    }

    function animateRain() {
        for (var i = 0; i < drops.length; i++) {
            var d = drops[i];

            d.y += d.speed;

            if (d.y > height) {
                d.y = -10;
                d.x = Math.random() * width;
            }

            d.el.style.left = d.x + "px";
            d.el.style.top = d.y + "px";
        }

        requestAnimationFrame(animateRain);
    }

    // Lightning effect
    function lightning() {
        var flash = document.createElement("div");
        flash.style.position = "absolute";
        flash.style.left = "0";
        flash.style.top = "0";
        flash.style.width = "100%";
        flash.style.height = "100%";
        flash.style.background = "white";
        flash.style.opacity = "0.8";

        box.appendChild(flash);

        setTimeout(function () {
            flash.style.opacity = "0";
        }, 50);

        setTimeout(function () {
            if (flash.parentNode) {
                flash.parentNode.removeChild(flash);
            }
        }, 200);

        // Random next lightning
        setTimeout(lightning, 2000 + Math.random() * 5000);
    }

    animateRain();
    lightning();
})();
</script>

    
</body>
</html>
