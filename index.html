<!DOCTYPE html>
<html>
<head>
  <title>Jumping Ball Animation</title>
  <style>
    body {
      margin: 0;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      background: #111;
      width: 300em;   /* visual size */
      height: 300em;
      max-width: 100%; /* prevents overflow */
    }
  </style>
</head>
<body>

<canvas id="canvas" width="500" height="300"></canvas>

<script>
// Setup canvas
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");

// Ball properties
var ball = {
  x: canvas.width / 2,
  y: 50,
  radius: 20,
  dy: 5,        // initial upward motion
  gravity: 0.5,
  bounce: 1     // perfect bounce (no energy loss)
};

// Animation loop
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Apply gravity
  ball.dy += ball.gravity;
  ball.y += ball.dy;

  // Bounce on ground
  if (ball.y + ball.radius > canvas.height) {
    ball.y = canvas.height - ball.radius;
    ball.dy = -Math.abs(ball.dy); // always bounce upward
  }

  // Bounce on ceiling (optional for continuous motion)
  if (ball.y - ball.radius < 0) {
    ball.y = ball.radius;
    ball.dy = Math.abs(ball.dy);
  }

  // Draw ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
  ctx.closePath();

  requestAnimationFrame(animate);
}

// Start animation
animate();
</script>

</body>
</html>
</script>

</body>
</html>
</body>
</html>
