<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Chem Engine | Ultra Fast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #050505; --panel: rgba(15,15,15,0.9); --text: #eee; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; overflow: hidden; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        #ui * { pointer-events: auto; }
        
        .panel { background: var(--panel); border: 1px solid #333; border-radius: 8px; }
        
        .search-container { position: relative; width: 300px; }
        input { width: 100%; background: #111; border: 1px solid #333; padding: 12px; border-radius: 6px; color: #fff; outline: none; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: var(--accent); }
        .suggestions { position: absolute; top: 100%; left: 0; width: 100%; max-height: 200px; overflow-y: auto; background: #111; border: 1px solid #333; border-top: none; z-index: 10; display: none; }
        .suggestions div { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #222; }
        .suggestions div:hover { background: var(--accent); color: #000; }

        .controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; }
        button { background: #111; border: 1px solid #333; color: #aaa; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        button.active { background: var(--accent); color: #000; border-color: var(--accent); }

        #data-box { width: 300px; padding: 15px; box-sizing: border-box; }
        .title { font-size: 20px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 10px; }
        .val { font-size: 13px; font-family: monospace; word-wrap: break-word; }
        
        #tooltip { position: absolute; background: #000; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; pointer-events: none; display: none; z-index: 100; transform: translate(-50%, -150%); border: 1px solid var(--accent); }
        #loader { display: none; position: absolute; right: 12px; top: 12px; width: 14px; height: 14px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Stats */
        #perf { position: absolute; bottom: 15px; right: 15px; font-size: 10px; color: #666; font-family: monospace; text-align: right; pointer-events: none;}
    </style>
</head>
<body>

<div id="tooltip"></div>

<div id="ui">
    <div class="search-container">
        <input type="text" id="search" placeholder="Search (e.g. Titanium Dioxide)..." autocomplete="off">
        <div id="loader"></div>
        <div id="suggestions" class="suggestions"></div>
    </div>

    <div class="controls">
        <button class="mode-btn active" data-mode="ball">Ball & Stick</button>
        <button class="mode-btn" data-mode="space">Spacefill</button>
    </div>

    <div id="data-box" class="panel">
        <div id="m-name" class="title">Loading...</div>
        <div class="label">Formula</div><div id="m-form" class="val">-</div>
        <div class="label">Mass (g/mol)</div><div id="m-mass" class="val">-</div>
        <div class="label">SMILES</div><div id="m-smiles" class="val" style="color: #888;">-</div>
    </div>
    
    <div id="perf">Atoms: 0 | Bonds: 0</div>
</div>

<script>
    // Minimal atomic dictionary mapped to RGB colors
    const ATOMS = {
        'H': { c: new THREE.Color(0xffffff), r: 0.32, n: 'Hydrogen' }, 'C': { c: new THREE.Color(0x555555), r: 0.55, n: 'Carbon' },
        'N': { c: new THREE.Color(0x3366ff), r: 0.50, n: 'Nitrogen' }, 'O': { c: new THREE.Color(0xff2222), r: 0.50, n: 'Oxygen' },
        'S': { c: new THREE.Color(0xddcc00), r: 0.65, n: 'Sulfur' },   'P': { c: new THREE.Color(0xff8800), r: 0.65, n: 'Phosphorus' },
        'Cl':{ c: new THREE.Color(0x00ff00), r: 0.60, n: 'Chlorine' }, 'F': { c: new THREE.Color(0x00ffff), r: 0.45, n: 'Fluorine' }
    };
    const defaultAtom = { c: new THREE.Color(0xaaaaaa), r: 0.5, n: 'Unknown' };

    let scene, camera, renderer, controls;
    let atomMesh, bondMesh; // The only two meshes we need!
    let atomDataMap = []; // For raycaster tooltips
    let raycaster, mouse;
    let currentMode = 'ball';

    // Shared Geometries & Materials
    const sphereGeo = new THREE.SphereGeometry(1, 16, 16); // Low poly, smooth shading makes it look round
    const bondGeo = new THREE.CylinderGeometry(0.12, 0.12, 1, 6);
    bondGeo.rotateX(Math.PI / 2); // Point along Z axis
    bondGeo.translate(0, 0, 0.5); // Pivot at the base
    
    const atomMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const bondMat = new THREE.MeshPhongMaterial({ color: 0xffffff });

    // Reusable math objects (prevents garbage collection stutter)
    const _matrix = new THREE.Matrix4();
    const _position = new THREE.Vector3();
    const _scale = new THREE.Vector3();
    const _quaternion = new THREE.Quaternion();
    const _up = new THREE.Vector3(0, 1, 0);

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.autoRotate = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(10, 20, 10);
        scene.add(light);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        
        window.addEventListener('resize', onResize);
        window.addEventListener('pointermove', onPointerMove);
        setupUI();

        fetchMolecule('Caffeine');
        animate();
    }

    async function fetchMolecule(query) {
        document.getElementById('loader').style.display = 'block';
        try {
            const metaRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(query)}/property/MolecularFormula,MolecularWeight,CanonicalSMILES/JSON`);
            const meta = await metaRes.json();
            const p = meta.PropertyTable.Properties[0];

            document.getElementById('m-name').innerText = query;
            document.getElementById('m-form').innerText = p.MolecularFormula;
            document.getElementById('m-mass').innerText = p.MolecularWeight;
            document.getElementById('m-smiles').innerText = p.CanonicalSMILES;

            let sdfRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${p.CID}/record/SDF/?record_type=3d`);
            if (!sdfRes.ok) sdfRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${p.CID}/record/SDF/`);
            
            buildMolecule(await sdfRes.text());
        } catch (e) {
            document.getElementById('m-name').innerText = "Not Found";
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function buildMolecule(sdf) {
        // Cleanup old meshes
        if (atomMesh) { scene.remove(atomMesh); atomMesh.dispose(); }
        if (bondMesh) { scene.remove(bondMesh); bondMesh.dispose(); }
        atomDataMap = [];

        const lines = sdf.split('\n');
        const counts = lines[3].trim().split(/\s+/);
        const atomCount = parseInt(counts[0]);
        const bondCount = parseInt(counts[1]);

        // Setup Instanced Meshes
        atomMesh = new THREE.InstancedMesh(sphereGeo, atomMat, atomCount);
        bondMesh = new THREE.InstancedMesh(bondGeo, bondMat, currentMode === 'space' ? 0 : bondCount * 2);
        
        const rawAtoms = [];
        let min = new THREE.Vector3(Infinity, Infinity, Infinity);
        let max = new THREE.Vector3(-Infinity, -Infinity, -Infinity);

        // 1. Parse & Set Atoms (O(N))
        for (let i = 0; i < atomCount; i++) {
            const parts = lines[4 + i].trim().split(/\s+/);
            const x = parseFloat(parts[0]), y = parseFloat(parts[1]), z = parseFloat(parts[2]);
            const el = parts[3];
            const data = ATOMS[el] || defaultAtom;

            _position.set(x, y, z);
            min.min(_position); max.max(_position); // Calculate bounding box fast
            
            const r = currentMode === 'space' ? data.r * 2.5 : data.r;
            _scale.set(r, r, r);
            _matrix.compose(_position, _quaternion.identity(), _scale);
            
            atomMesh.setMatrixAt(i, _matrix);
            atomMesh.setColorAt(i, data.c);

            rawAtoms.push({ pos: _position.clone(), c: data.c });
            atomDataMap.push({ name: data.n, symbol: el }); // Save for raycaster
        }

        // 2. Parse & Set Bonds (O(N) - exact SDF data instead of math distance loops)
        if (currentMode !== 'space' && bondCount > 0) {
            let bondIndex = 0;
            for (let i = 0; i < bondCount; i++) {
                const parts = lines[4 + atomCount + i].trim().split(/\s+/);
                const a1 = parseInt(parts[0]) - 1; // SDF is 1-indexed
                const a2 = parseInt(parts[1]) - 1;

                const p1 = rawAtoms[a1].pos;
                const p2 = rawAtoms[a2].pos;
                const mid = p1.clone().lerp(p2, 0.5);
                const dist = p1.distanceTo(mid);

                // Half Bond 1 (From Atom 1 to Midpoint)
                _matrix.lookAt(p1, mid, _up);
                _matrix.multiply(new THREE.Matrix4().makeScale(1, 1, dist));
                _matrix.setPosition(p1);
                bondMesh.setMatrixAt(bondIndex, _matrix);
                bondMesh.setColorAt(bondIndex, rawAtoms[a1].c);
                bondIndex++;

                // Half Bond 2 (From Atom 2 to Midpoint)
                _matrix.lookAt(p2, mid, _up);
                _matrix.multiply(new THREE.Matrix4().makeScale(1, 1, dist));
                _matrix.setPosition(p2);
                bondMesh.setMatrixAt(bondIndex, _matrix);
                bondMesh.setColorAt(bondIndex, rawAtoms[a2].c);
                bondIndex++;
            }
            bondMesh.instanceMatrix.needsUpdate = true;
            bondMesh.instanceColor.needsUpdate = true;
            scene.add(bondMesh);
        }

        atomMesh.instanceMatrix.needsUpdate = true;
        atomMesh.instanceColor.needsUpdate = true;
        scene.add(atomMesh);

        document.getElementById('perf').innerText = `Atoms: ${atomCount} | Bonds: ${bondCount}`;

        // Auto Frame Camera
        const center = min.clone().lerp(max, 0.5);
        const size = max.distanceTo(min);
        scene.position.sub(center); // Center the world
        camera.position.set(0, 0, Math.max(size * 1.2, 10));
        controls.target.set(0,0,0);
    }

    // --- INTERACTION & UI ---
    function onPointerMove(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        const tt = document.getElementById('tooltip');

        if (!atomMesh) return;

        raycaster.setFromCamera(mouse, camera);
        // Only intersect atoms, ignore bonds
        const hit = raycaster.intersectObject(atomMesh)[0]; 

        if (hit && hit.instanceId !== undefined) {
            document.body.style.cursor = 'pointer';
            tt.style.display = 'block';
            tt.style.left = e.clientX + 'px';
            tt.style.top = e.clientY + 'px';
            const data = atomDataMap[hit.instanceId];
            tt.innerText = `${data.name} (${data.symbol})`;
        } else {
            document.body.style.cursor = 'default';
            tt.style.display = 'none';
        }
    }

    function setupUI() {
        const input = document.getElementById('search');
        const sugg = document.getElementById('suggestions');
        let timer;

        input.addEventListener('input', () => {
            clearTimeout(timer);
            if(input.value.length < 2) { sugg.style.display = "none"; return; }
            timer = setTimeout(async () => {
                const r = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/autocomplete/compound/${input.value}/json?limit=5`);
                const data = await r.json();
                sugg.innerHTML = "";
                if(data.dictionary_terms) {
                    sugg.style.display = "block";
                    data.dictionary_terms.compound.forEach(term => {
                        const div = document.createElement('div');
                        div.innerText = term;
                        div.onclick = () => { 
                            input.value = term; 
                            sugg.style.display = "none"; 
                            fetchMolecule(term); 
                        };
                        sugg.appendChild(div);
                    });
                }
            }, 250);
        });

        document.addEventListener('click', e => { if(!e.target.closest('.search-container')) sugg.style.display = 'none'; });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.dataset.mode;
                fetchMolecule(document.getElementById('m-name').innerText);
            };
        });
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
