<!DOCTYPE html>
<html>
<head>
    <title>Bouncing Ball</title>
    <style>
        #box {
            width: 300px;
            height: 300px;
            border: 2px solid black;
            position: relative;
            overflow: hidden;
        }

        #ball {
            width: 30px;
            height: 30px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            left: 0;
            top: 0;
        }
    </style>
</head>
<body>

<div id="box">
    <div id="ball"></div>
</div>

<script>
    var ball = document.getElementById("ball");
    var box = document.getElementById("box");

    var x = 0;
    var y = 0;

    var dx = 2; // speed in x direction
    var dy = 2; // speed in y direction

    var boxSize = 300;
    var ballSize = 30;

    function animate() {
        x += dx;
        y += dy;

        // Bounce on walls
        if (x + ballSize > boxSize || x < 0) {
            dx = -dx;
        }

        if (y + ballSize > boxSize || y < 0) {
            dy = -dy;
        }

        ball.style.left = x + "px";
        ball.style.top = y + "px";

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
