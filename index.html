<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ff88; --bg: #050508; --panel: rgba(15, 18, 25, 0.9); }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: #eee; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
            overflow: hidden; touch-action: none; /* Prevents accidental zooming/scrolling */
        }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; padding: 15px; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: space-between; 
        }
        #ui * { pointer-events: auto; }
        
        .top-section { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
        .panel { background: var(--panel); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        
        .search-box { position: relative; width: 100%; }
        input { 
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #333; 
            padding: 14px 40px; border-radius: 12px; color: #fff; font-size: 16px; /* 16px prevents iOS zoom on focus */
            outline: none; box-sizing: border-box;
        }
        .fa-search { position: absolute; left: 15px; top: 16px; color: #666; }

        .controls { 
            display: flex; gap: 4px; background: rgba(0,0,0,0.3); padding: 4px; 
            border-radius: 12px; align-self: center; width: 100%; justify-content: space-around;
        }
        button { 
            background: transparent; border: none; color: #888; padding: 12px 10px; 
            border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; flex: 1;
        }
        button.active { background: var(--accent); color: #000; }

        #data-box { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .title { grid-column: span 2; font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 5px; }
        .label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-family: monospace; font-size: 12px; color: #ccc; }
        
        #loader { display: none; position: absolute; right: 12px; top: 16px; width: 14px; height: 14px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #perf { position: absolute; bottom: 80px; right: 15px; font-size: 9px; color: #444; }
    </style>
</head>
<body>

<div id="ui">
    <div class="top-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search" placeholder="Search (e.g. Aspirin)" autocomplete="off" enterkeyhint="search">
            <div id="loader"></div>
        </div>
        
        <div id="data-box" class="panel">
            <div id="m-name" class="title">Loading...</div>
            <div>
                <div class="label">Formula</div>
                <div id="m-form" class="val">-</div>
            </div>
            <div>
                <div class="label">Weight</div>
                <div id="m-mass" class="val">-</div>
            </div>
        </div>
    </div>

    <div class="controls panel">
        <button class="mode-btn active" data-mode="ball">Ball & Stick</button>
        <button class="mode-btn" data-mode="stick">Sticks</button>
        <button class="mode-btn" data-mode="space">Spacefill</button>
    </div>
</div>

<div id="perf">...</div>

<script>
    const ATOMS = {
        'H': { c: 0xffffff, r: 0.3 }, 'C': { c: 0x444444, r: 0.6 },
        'N': { c: 0x3366ff, r: 0.55 }, 'O': { c: 0xff2222, r: 0.55 },
        'S': { c: 0xddcc00, r: 0.7 },  'P': { c: 0xff8800, r: 0.7 },
        'Cl':{ c: 0x11ff11, r: 0.65 }, 'F': { c: 0x00ffff, r: 0.5 }
    };

    let scene, camera, renderer, controls, atomMesh, bondMesh;
    let currentMode = 'ball', currentSDF = "";

    // Mobile Optimization: Reduced polygon count for smoother FPS on phones
    const sphereGeo = new THREE.SphereGeometry(1, 20, 20); 
    const cylinderGeo = new THREE.CylinderGeometry(0.15, 0.15, 1, 8); 
    cylinderGeo.rotateX(Math.PI / 2);
    cylinderGeo.translate(0, 0, 0.5);

    const atomMat = new THREE.MeshStandardMaterial({ roughness: 0.4, metalness: 0.1 });
    const bondMat = new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.1 });

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Cap pixel ratio at 2.0 to prevent 4k rendering on small screens
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.rotateSpeed = 0.8; // Slower for touch precision

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dLight.position.set(5, 10, 7);
        scene.add(dLight);

        document.getElementById('search').addEventListener('keypress', e => {
            if(e.key === 'Enter') {
                fetchMolecule(e.target.value);
                e.target.blur(); // Hide mobile keyboard
            }
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => { // Faster response on mobile
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                renderMolecule(currentSDF);
            }, {passive: true});
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        fetchMolecule('Ethanol');
        animate();
    }

    async function fetchMolecule(name) {
        document.getElementById('loader').style.display = 'block';
        try {
            const propRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${name}/property/MolecularFormula,MolecularWeight,CID/JSON`);
            const propData = await propRes.json();
            const p = propData.PropertyTable.Properties[0];
            
            document.getElementById('m-name').innerText = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById('m-form').innerText = p.MolecularFormula;
            document.getElementById('m-mass').innerText = Math.round(p.MolecularWeight);

            const sdfRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${p.CID}/record/SDF/?record_type=3d`);
            currentSDF = await sdfRes.text();
            renderMolecule(currentSDF);
        } catch(e) { document.getElementById('m-name').innerText = "Not Found"; }
        document.getElementById('loader').style.display = 'none';
    }

    function renderMolecule(sdf) {
        if(!sdf) return;
        if(atomMesh) scene.remove(atomMesh);
        if(bondMesh) scene.remove(bondMesh);

        const lines = sdf.split('\n');
        const counts = lines[3].trim().split(/\s+/);
        const atomCount = parseInt(counts[0]);
        const bondCount = parseInt(counts[1]);

        atomMesh = new THREE.InstancedMesh(sphereGeo, atomMat, atomCount);
        bondMesh = new THREE.InstancedMesh(cylinderGeo, bondMat, bondCount * 2);

        const atoms = [];
        const matrix = new THREE.Matrix4();
        const color = new THREE.Color();
        const min = new THREE.Vector3(Infinity, Infinity, Infinity);
        const max = new THREE.Vector3(-Infinity, -Infinity, -Infinity);

        for(let i = 0; i < atomCount; i++) {
            const parts = lines[4+i].trim().split(/\s+/);
            const pos = new THREE.Vector3(parseFloat(parts[0]), parseFloat(parts[1]), parseFloat(parts[2]));
            const symbol = parts[3];
            const data = ATOMS[symbol] || { c: 0xff00ff, r: 0.5 };

            atoms.push({ pos, color: data.c });
            min.min(pos); max.max(pos);

            let s = currentMode === 'space' ? data.r * 2.2 : (currentMode === 'stick' ? 0.16 : data.r);
            matrix.makeScale(s, s, s);
            matrix.setPosition(pos);
            atomMesh.setMatrixAt(i, matrix);
            atomMesh.setColorAt(i, color.setHex(data.c));
        }

        if(currentMode !== 'space') {
            let bIdx = 0;
            for(let i = 0; i < bondCount; i++) {
                const parts = lines[4 + atomCount + i].trim().split(/\s+/);
                const a1 = parseInt(parts[0]) - 1, a2 = parseInt(parts[1]) - 1;
                if(!atoms[a1] || !atoms[a2]) continue;

                const p1 = atoms[a1].pos, p2 = atoms[a2].pos;
                const mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
                const dist = p1.distanceTo(mid);
                const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), new THREE.Vector3().subVectors(mid, p1).normalize());

                matrix.compose(p1, quat, new THREE.Vector3(1, 1, dist));
                bondMesh.setMatrixAt(bIdx, matrix);
                bondMesh.setColorAt(bIdx++, color.setHex(atoms[a1].color));

                const quat2 = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), new THREE.Vector3().subVectors(mid, p2).normalize());
                matrix.compose(p2, quat2, new THREE.Vector3(1, 1, dist));
                bondMesh.setMatrixAt(bIdx, matrix);
                bondMesh.setColorAt(bIdx++, color.setHex(atoms[a2].color));
            }
        } else { bondMesh.count = 0; }

        scene.add(atomMesh);
        scene.add(bondMesh);

        const center = new THREE.Vector3().addVectors(min, max).multiplyScalar(0.5);
        scene.position.copy(center).multiplyScalar(-1);
        camera.position.z = Math.max(max.distanceTo(min) * 2, 10);
        document.getElementById('perf').innerText = `Atoms: ${atomCount} | Bonds: ${bondCount}`;
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
